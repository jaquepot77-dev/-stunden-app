<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pits Burger Stunden</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0b1220;--card:#111827;--muted:#94a3b8;--text:#f8fafc;--accent:#22c55e;--danger:#ef4444;--line:#263244;--input:#0f172a}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);padding:14px}h1{font-size:24px;margin:8px 0 14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 8px 20px rgba(0,0,0,.18)}label{display:block;font-size:13px;color:var(--muted);margin:10px 0 5px}input,select,button,textarea{width:100%;font-size:16px;border-radius:12px;border:1px solid var(--line);padding:11px;background:var(--input);color:var(--text)}button{background:#1f2937;font-weight:700}button.primary{background:var(--accent);color:#052e16;border:0}button.danger{background:#3b1116;color:#fecaca;border-color:#7f1d1d}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.muted{color:var(--muted);font-size:13px}.total{font-size:28px;font-weight:800}.shift{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#0b1220}.shift-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.shift-title{font-weight:800}.smallbtn{width:auto;padding:8px 10px;font-size:13px}.day{border-top:1px solid var(--line);padding:12px 0}.day:first-child{border-top:0}.day-title{display:flex;justify-content:space-between;align-items:center;gap:10px}.badge{font-size:13px;background:#172033;border:1px solid var(--line);padding:6px 9px;border-radius:999px}.hidden{display:none}.footer{height:40px}.ok{color:#86efac}.warn{color:#fde68a}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}textarea{height:120px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}a{color:#60a5fa}.hint{background:#132014;border:1px solid #315c35;border-radius:12px;padding:10px;margin-top:10px;color:#d9f99d}
</style>
</head>
<body>
<h1>🍔 Pits Burger Stunden</h1>
<div class="card">
  <div id="status" class="ok">JavaScript läuft. App ist bereit.</div>
  <label>Mitarbeiter</label>
  <select id="employeeSelect"></select>
  <div class="row">
    <div><label>Neuer Mitarbeiter</label><input id="newEmployee" placeholder="Name eingeben"></div>
    <div style="display:flex;align-items:end"><button class="primary" id="addEmployeeBtn">Hinzufügen</button></div>
  </div>
  <div class="row">
    <div><label>Monat</label><input type="month" id="monthInput"></div>
    <div><label>Monatssumme</label><div class="total"><span id="monthTotal">0,00</span> h</div></div>
  </div>
  <div class="hint">Neu: Pro Tag kannst du mehrere Schichten eintragen, z. B. vormittags Schorndorf und abends Plüderhausen.</div>
</div>

<div class="card">
  <div class="actions">
    <button id="exportBtn">CSV exportieren</button>
    <button id="backupBtn">Backup kopieren</button>
  </div>
  <label>Backup einfügen</label>
  <textarea id="backupText" placeholder="Backup hier einfügen..."></textarea>
  <button id="restoreBtn">Backup wiederherstellen</button>
</div>

<div id="days" class="card"></div>
<div class="footer"></div>
<script>
(function(){
const STORAGE_KEY='pits_stunden_app_v_multi_shift_1';
const filialen=['Schorndorf','Plüderhausen','Urbach'];
const defaultEmployees=Array.from({length:20},(_,i)=>'Mitarbeiter '+(i+1));
let state=load();
const $=id=>document.getElementById(id);
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{employees:defaultEmployees,entries:{}}}catch(e){return{employees:defaultEmployees,entries:{}}}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function pad(n){return String(n).padStart(2,'0')}
function todayMonth(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)}
function daysInMonth(ym){const [y,m]=ym.split('-').map(Number);return new Date(y,m,0).getDate()}
function calcHours(start,end,pause){if(!start||!end)return 0;const [sh,sm]=start.split(':').map(Number);const [eh,em]=end.split(':').map(Number);let s=sh*60+sm,e=eh*60+em;if(e<s)e+=24*60;let mins=e-s-(Number(pause)||0);return Math.max(0,mins/60)}
function key(emp,ym,day){return emp+'|'+ym+'|'+day}
function getShifts(emp,ym,day){const k=key(emp,ym,day); if(!state.entries[k]) state.entries[k]=[]; return state.entries[k];}
function renderEmployees(){const sel=$('employeeSelect');sel.innerHTML='';state.employees.forEach(name=>{const o=document.createElement('option');o.value=name;o.textContent=name;sel.appendChild(o);});}
function render(){renderEmployees(); if(!$('monthInput').value) $('monthInput').value=todayMonth(); renderDays();}
function renderDays(){const emp=$('employeeSelect').value;const ym=$('monthInput').value||todayMonth();const wrap=$('days');let total=0;wrap.innerHTML='<div class="muted">Monat: '+ym+' · Mitarbeiter: '+emp+'</div>';for(let d=1;d<=daysInMonth(ym);d++){const shifts=getShifts(emp,ym,d);let dayTotal=shifts.reduce((a,s)=>a+calcHours(s.start,s.end,s.pause),0);total+=dayTotal;const day=document.createElement('div');day.className='day';day.innerHTML='<div class="day-title"><strong>'+pad(d)+'.</strong><span class="badge">'+dayTotal.toFixed(2).replace('.',',')+' h</span></div><div id="shifts_'+d+'"></div><button class="smallbtn primary" data-add="'+d+'">+ Schicht hinzufügen</button>';wrap.appendChild(day);const sw=day.querySelector('#shifts_'+d);if(shifts.length===0){const p=document.createElement('div');p.className='muted';p.style.margin='8px 0';p.textContent='Keine Schicht eingetragen';sw.appendChild(p)}shifts.forEach((s,idx)=>{const div=document.createElement('div');div.className='shift';div.innerHTML='<div class="shift-head"><div class="shift-title">Schicht '+(idx+1)+' · '+calcHours(s.start,s.end,s.pause).toFixed(2).replace('.',',')+' h</div><button class="smallbtn danger" data-del="'+d+'|'+idx+'">Löschen</button></div><label>Filiale</label><select data-field="filiale" data-day="'+d+'" data-idx="'+idx+'">'+filialen.map(f=>'<option '+(s.filiale===f?'selected':'')+'>'+f+'</option>').join('')+'</select><div class="row3"><div><label>Beginn</label><input type="time" value="'+(s.start||'')+'" data-field="start" data-day="'+d+'" data-idx="'+idx+'"></div><div><label>Ende</label><input type="time" value="'+(s.end||'')+'" data-field="end" data-day="'+d+'" data-idx="'+idx+'"></div><div><label>Pause Min.</label><input type="number" min="0" step="5" value="'+(s.pause||0)+'" data-field="pause" data-day="'+d+'" data-idx="'+idx+'"></div></div><label>Notiz</label><input placeholder="optional" value="'+(s.note||'').replace(/"/g,'&quot;')+'" data-field="note" data-day="'+d+'" data-idx="'+idx+'">';sw.appendChild(div);});}
$('monthTotal').textContent=total.toFixed(2).replace('.',',');}
function addShift(day){const emp=$('employeeSelect').value,ym=$('monthInput').value;getShifts(emp,ym,day).push({filiale:'Schorndorf',start:'',end:'',pause:0,note:''});save();renderDays();}
function updateShift(day,idx,field,value){const emp=$('employeeSelect').value,ym=$('monthInput').value;const shifts=getShifts(emp,ym,day);if(!shifts[idx])return;shifts[idx][field]=value;save();renderDays();}
function delShift(day,idx){const emp=$('employeeSelect').value,ym=$('monthInput').value;getShifts(emp,ym,day).splice(idx,1);save();renderDays();}
function addEmployee(){const name=$('newEmployee').value.trim();if(!name)return alert('Bitte Namen eingeben.');if(state.employees.includes(name))return alert('Mitarbeiter gibt es schon.');state.employees.push(name);$('newEmployee').value='';save();render();$('employeeSelect').value=name;renderDays();}
function csvEscape(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function exportCsv(){const emp=$('employeeSelect').value,ym=$('monthInput').value;let rows=[['Mitarbeiter','Monat','Tag','Filiale','Beginn','Ende','Pause Minuten','Netto Stunden','Notiz']];for(let d=1;d<=daysInMonth(ym);d++){getShifts(emp,ym,d).forEach(s=>rows.push([emp,ym,pad(d),s.filiale,s.start,s.end,s.pause,calcHours(s.start,s.end,s.pause).toFixed(2),s.note||'']));}
const csv=rows.map(r=>r.map(csvEscape).join(';')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='stunden_'+emp.replace(/\s+/g,'_')+'_'+ym+'.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}
function backup(){const txt=JSON.stringify(state);navigator.clipboard?.writeText(txt).then(()=>alert('Backup wurde kopiert.')).catch(()=>{$('backupText').value=txt;alert('Backup steht im Textfeld. Bitte kopieren.');});}
function restore(){try{const data=JSON.parse($('backupText').value);if(!data.employees||!data.entries)throw new Error();state=data;save();render();alert('Backup wiederhergestellt.');}catch(e){alert('Backup konnte nicht gelesen werden.');}}
$('addEmployeeBtn').addEventListener('click',addEmployee);$('employeeSelect').addEventListener('change',renderDays);$('monthInput').addEventListener('change',renderDays);$('exportBtn').addEventListener('click',exportCsv);$('backupBtn').addEventListener('click',backup);$('restoreBtn').addEventListener('click',restore);
$('days').addEventListener('click',e=>{if(e.target.dataset.add)addShift(Number(e.target.dataset.add)); if(e.target.dataset.del){const [d,i]=e.target.dataset.del.split('|').map(Number);delShift(d,i);}});
$('days').addEventListener('change',e=>{const t=e.target;if(t.dataset.field)updateShift(Number(t.dataset.day),Number(t.dataset.idx),t.dataset.field,t.value);});
$('days').addEventListener('input',e=>{const t=e.target;if(t.dataset.field)updateShift(Number(t.dataset.day),Number(t.dataset.idx),t.dataset.field,t.value);});
render();
})();
</script>
</body>
</html>
